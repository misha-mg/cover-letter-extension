<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="../styles/popup.css" />
  </head>
  <body>
    <div class="container">
      <h1>Letter Creator</h1>

      <details class="form-group" id="defaultCoverSection">
        <summary style="cursor: pointer; font-weight: 600; color: #555">
          Default Cover Letter
        </summary>
        <div style="margin-top: 12px">
          <textarea
            id="defaultCoverLetter"
            class="defaultCoverLetter"
            placeholder="Enter your base cover letter template here..."
          ></textarea>
          <div class="button-group">
            <button id="saveDefaultBtn" class="save-btn">Save</button>
            <span id="saveStatus" class="save-status"></span>
          </div>
        </div>
      </details>

      <div class="form-group">
        <label for="currentOffer">Current Offer Text:</label>
        <textarea
          id="currentOffer"
          placeholder="Paste the job description or offer details here..."
        ></textarea>
      </div>

      <button id="generateBtn" class="generate-btn">Generate</button>

      <div id="result" class="result"></div>
    </div>

    <script src="../../env.js"></script>
    <script src="../../api.js"></script>
    <script src="../scripts/popup.js"></script>
  </body>
</html>
