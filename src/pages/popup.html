<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="../styles/popup.css" />
  </head>
  <body>
    <div class="container">
      <h1>Letter Creator</h1>

      <details class="form-group" id="defaultCoverSection">
        <summary style="cursor: pointer; font-weight: 600; color: #555">
          Default Cover Letter
        </summary>
        <div style="margin-top: 12px">
          <textarea
            id="defaultCoverLetter"
            class="defaultCoverLetter"
            placeholder="Enter your base cover letter template here..."
          ></textarea>
          <div class="button-group">
            <button id="saveDefaultBtn" class="save-btn">
              Save as template
            </button>
            <span id="saveStatus" class="save-status"></span>
          </div>
        </div>
      </details>

      <div class="form-group">
        <label for="currentOffer">Job Description:</label>
        <textarea
          id="currentOffer"
          placeholder="Paste the job description here..."
        ></textarea>
        <div class="button-group compact">
          <button id="clearJobBtn" class="secondary-btn">Clear job text</button>
        </div>
      </div>

      <button id="generateBtn" class="generate-btn">Generate</button>

      <div id="result" class="result"></div>
      <div id="resultActions" class="result-actions">
        <button id="copyResultBtn" class="secondary-btn">Copy</button>
        <button id="insertResultBtn" class="secondary-btn">
          Insert into page
        </button>
      </div>
    </div>

    <script src="../config/env.js"></script>
    <script src="../api/candidate-profile.js"></script>
    <script src="../api/prompt.js"></script>
    <script src="../../dist/openrouter.bundle.js"></script>
    <script src="../api/clipboard.js"></script>
    <script src="../scripts/popup.js"></script>
  </body>
</html>
